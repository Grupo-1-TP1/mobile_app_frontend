name: mobile_app_frontend
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  uuid: ^4.5.1
  cupertino_icons: ^1.0.8

  # State Management & Business Logic
  flutter_bloc: ^8.0.0
  bloc: ^8.0.0
  equatable: ^2.0.5

  # Local Storage
  shared_preferences: ^2.0.0

  # UI & Navigation
  go_router: ^10.0.0
  gap: ^3.0.0

  # Utilities
  intl: ^0.19.0
  http: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^9.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/ml_models/
