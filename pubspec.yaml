name: mobile_app_frontend
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  uuid: ^4.5.1
  cupertino_icons: ^1.0.8
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^17.2.2
  tflite_flutter: ^0.11.0
  diacritic: ^0.1.6
  onnxruntime: ^1.4.1
  fl_chart: ^0.66.0

  # State Management & Business Logic
  flutter_bloc: ^8.0.0
  bloc: ^8.0.0
  equatable: ^2.0.5

  # Local Storage
  shared_preferences: ^2.0.0

  # UI & Navigation
  go_router: ^10.0.0
  gap: ^3.0.0

  # Utilities
  intl: ^0.19.0
  http: ^1.0.0
  local_auth: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^9.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/ml_models/classifier_model.tflite
    - assets/ml_models/word_index.json
    - assets/ml_models/labels.json
    - assets/ml_models/recommendation_model.onnx