name: mobile_app_frontend
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management & Business Logic
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2

  # Networking & Local Storage
  http: ^1.1.0
  shared_preferences: ^2.2.0

  # ML & Data Processing
  tflite_flutter: ^0.10.0
  tflite_flutter_helper: ^0.4.0

  # UI & Navigation
  go_router: ^13.0.0
  gap: ^3.0.0

  # Data Processing
  csv: ^6.0.0

  # Utilities
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^9.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/ml_models/

